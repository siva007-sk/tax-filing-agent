services:

  backend:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      ENV: development
      PORT: "5000"
      LLM_URL: ${LLM_URL:-http://host.docker.internal:8080/v1/chat/completions}
      LLM_MODEL: ${LLM_MODEL:-local-model}
      TAX_UPDATE_INTERVAL_HOURS: ${TAX_UPDATE_INTERVAL_HOURS:-24}
      LOG_LEVEL: DEBUG
    volumes:
      - ./backend-python:/app          # Mount source for hot-reload
      - tax_data_dev:/app/data         # Persist SQLite DB
    networks:
      - dev

  frontend:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - /app/node_modules              # Anonymous volume keeps container node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    networks:
      - dev

volumes:
  tax_data_dev:
    driver: local

networks:
  dev:
    driver: bridge
