services:

  backend:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    environment:
      ENV: production
      PORT: "5000"
      LLM_URL: ${LLM_URL:-http://host.docker.internal:8080/v1/chat/completions}
      LLM_MODEL: ${LLM_MODEL:-local-model}
      TAX_UPDATE_INTERVAL_HOURS: ${TAX_UPDATE_INTERVAL_HOURS:-24}
      RATE_LIMIT_RPM: ${RATE_LIMIT_RPM:-120}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - tax_data:/app/data          # Persist SQLite DB across restarts
    networks:
      - internal
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=8)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal

volumes:
  tax_data:
    driver: local

networks:
  internal:
    driver: bridge
